<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FW Gatekeeper Kiosk</title>
    <style>
        :root {
            --bg-0: #0c0c0d;
            --bg-1: #151618;
            --bg-2: #1d1f23;
            --ink: #f4f2ef;
            --muted: #9ea1a8;
            --gold: #b8860b;
            --ok: #2fa36b;
            --warn: #bf4934;
            --line: #2f3238;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html,
        body {
            height: 100%;
            overflow: hidden;
        }

        body {
            height: 100vh;
            max-height: 100vh;
            background:
                radial-gradient(1200px 500px at 90% -20%, rgba(184, 134, 11, 0.18), transparent 60%),
                radial-gradient(800px 400px at -10% 120%, rgba(184, 134, 11, 0.12), transparent 70%),
                var(--bg-0);
            color: var(--ink);
            font-family: "Segoe UI", "Helvetica Neue", sans-serif;
            display: grid;
            grid-template-rows: auto minmax(0, 1fr) auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 14px;
            min-height: 52px;
            padding: 10px 14px;
            border-bottom: 1px solid var(--line);
            background: rgba(12, 12, 13, 0.85);
            backdrop-filter: blur(4px);
            overflow: hidden;
        }

        .title {
            display: flex;
            align-items: baseline;
            gap: 10px;
            min-width: 0;
        }

        .title h1 {
            font-size: 1.05rem;
            letter-spacing: 0.12rem;
            color: var(--gold);
            font-weight: 700;
            text-transform: uppercase;
            flex-shrink: 0;
        }

        .title p {
            color: var(--muted);
            font-size: 0.78rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .clock-wrap {
            display: flex;
            align-items: baseline;
            gap: 10px;
            text-align: right;
            font-variant-numeric: tabular-nums;
            flex-shrink: 0;
        }

        .clock {
            font-size: 1.2rem;
            font-weight: 600;
            line-height: 1;
        }

        .date {
            color: var(--muted);
            font-size: 0.78rem;
            white-space: nowrap;
        }

        .main {
            display: grid;
            grid-template-columns: minmax(0, 1fr) clamp(220px, 24vw, 260px);
            gap: 10px;
            padding: 10px 12px;
            min-height: 0;
            overflow: hidden;
        }

        .stage {
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.02), rgba(255, 255, 255, 0.01));
            border: 1px solid var(--line);
            border-radius: 12px;
            padding: 10px;
            display: grid;
            grid-template-rows: minmax(0, 1fr) auto;
            gap: 8px;
            min-height: 0;
            overflow: hidden;
        }

        .camera-box {
            border: 1px solid #3a3d43;
            border-radius: 10px;
            overflow: hidden;
            background: #000;
            min-height: 0;
            height: 100%;
        }

        .camera-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .status-card {
            background: var(--bg-2);
            border: 1px solid var(--line);
            border-left: 4px solid var(--gold);
            border-radius: 10px;
            padding: 10px 12px;
            display: flex;
            align-items: center;
            gap: 12px;
            overflow: hidden;
        }

        .status-label {
            color: var(--muted);
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.06rem;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .status-text {
            font-size: clamp(0.95rem, 1.8vw, 1.2rem);
            font-weight: 700;
            line-height: 1.1;
            flex: 1;
            min-width: 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .admin-controls {
            display: none;
            flex-direction: column;
            gap: 8px;
        }

        .admin-controls.active {
            display: flex;
        }

        .status-meta {
            color: var(--muted);
            font-size: 0.76rem;
            display: flex;
            gap: 8px;
            flex-wrap: nowrap;
            min-width: 0;
            overflow: hidden;
        }

        .status-meta span {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .side {
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.02), rgba(255, 255, 255, 0.01));
            border: 1px solid var(--line);
            border-radius: 12px;
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            min-height: 0;
            overflow: hidden;
        }

        .side h2 {
            color: var(--gold);
            font-size: 0.84rem;
            letter-spacing: 0.04rem;
            text-transform: uppercase;
        }

        .manual {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 6px;
        }

        .manual input {
            background: #0f1114;
            border: 1px solid var(--line);
            color: var(--ink);
            border-radius: 7px;
            padding: 8px 10px;
            font-size: 0.84rem;
            min-width: 0;
        }

        .manual button,
        .admin-toggle {
            border: 1px solid #6d5520;
            background: rgba(184, 134, 11, 0.14);
            color: #f0d18b;
            border-radius: 7px;
            padding: 7px 10px;
            font-weight: 600;
            cursor: pointer;
            font-size: 0.8rem;
        }

        .admin-toggle {
            width: 100%;
        }

        .manual-result {
            min-height: 18px;
            font-size: 0.78rem;
            line-height: 1.2;
        }

        .log-list {
            border: 1px solid var(--line);
            border-radius: 8px;
            overflow: hidden;
            background: #0f1114;
            min-height: 0;
            flex: 1;
        }

        .log-item {
            padding: 7px 8px;
            border-bottom: 1px solid #22252a;
            display: grid;
            grid-template-columns: auto minmax(0, 1fr) auto;
            gap: 8px;
            font-size: 0.78rem;
            align-items: center;
        }

        .log-item:last-child {
            border-bottom: none;
        }

        .log-item > :nth-child(2) {
            overflow: hidden;
            white-space: nowrap;
            text-overflow: ellipsis;
        }

        .pill {
            font-size: 0.65rem;
            border-radius: 999px;
            padding: 2px 6px;
            text-transform: uppercase;
            letter-spacing: 0.03rem;
            white-space: nowrap;
        }

        .pill.clock_in {
            background: rgba(47, 163, 107, 0.2);
            color: #87dfb3;
        }

        .pill.clock_out {
            background: rgba(191, 73, 52, 0.2);
            color: #ff9e8f;
        }

        .admin-panel {
            display: none;
            border: 1px solid var(--line);
            border-radius: 8px;
            padding: 8px;
            background: #0f1114;
            max-height: 110px;
            overflow: auto;
            font-size: 0.76rem;
        }

        .admin-panel.active {
            display: block;
        }

        .worker-row {
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto auto;
            gap: 6px;
            padding: 4px 0;
            border-bottom: 1px solid #22252a;
        }

        .worker-row:last-child {
            border-bottom: none;
        }

        .worker-row span:first-child {
            overflow: hidden;
            white-space: nowrap;
            text-overflow: ellipsis;
        }

        .footer {
            border-top: 1px solid var(--line);
            color: var(--muted);
            font-size: 0.74rem;
            padding: 6px 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            background: rgba(12, 12, 13, 0.85);
            overflow: hidden;
        }

        .footer span {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        @media (max-width: 1100px), (max-height: 640px) {
            .header {
                padding: 8px 10px;
                min-height: 46px;
            }

            .title {
                gap: 8px;
            }

            .title h1 {
                font-size: 0.96rem;
            }

            .title p,
            .date {
                font-size: 0.74rem;
            }

            .clock {
                font-size: 1.08rem;
            }

            .main {
                grid-template-columns: minmax(0, 1fr) 228px;
                gap: 8px;
                padding: 8px 10px;
            }

            .stage,
            .side {
                padding: 8px;
                border-radius: 10px;
            }

            .status-card {
                gap: 10px;
                padding: 8px 10px;
            }

            .status-meta {
                gap: 6px;
                font-size: 0.72rem;
            }

            .manual input,
            .manual button,
            .admin-toggle {
                font-size: 0.78rem;
            }

            .footer {
                font-size: 0.7rem;
                padding: 5px 10px;
            }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="title">
            <h1>GATEKEEPER</h1>
            <p id="kioskName">{{ kiosk_name }} ({{ kiosk_type }})</p>
        </div>
        <div class="clock-wrap">
            <div id="clock" class="clock">--:--:--</div>
            <div id="date" class="date">-----</div>
        </div>
    </header>

    <main class="main">
        <section class="stage">
            <div class="camera-box">
                <img src="/feed" alt="Live camera feed">
            </div>
            <div class="status-card">
                <div class="status-label">Live Status</div>
                <div id="statusText" class="status-text">Step toward camera</div>
                <div class="status-meta">
                    <span id="stateValue">State: IDLE</span>
                    <span id="earValue">EAR: 0.00</span>
                    <span id="knownValue">Workers: 0</span>
                    <span id="liveValue">Liveness: No</span>
                </div>
            </div>
        </section>

        <aside class="side">
            <div id="adminControls" class="admin-controls">
                <h2>Manual Clock</h2>
                <div class="manual">
                    <input id="manualName" type="text" placeholder="Worker name">
                    <button id="manualBtn">Submit</button>
                </div>
                <div id="manualResult" class="manual-result"></div>

                <button id="adminToggle" class="admin-toggle">Admin Mode (A)</button>
                <div id="adminPanel" class="admin-panel"></div>
            </div>

            <h2>Today Log</h2>
            <div id="logList" class="log-list"></div>
        </aside>
    </main>

    <footer class="footer">
        <span>Blink verification required before recognition</span>
        <span id="lastUpdated">Last update: --</span>
    </footer>

    <script>
        const statusText = document.getElementById("statusText");
        const statusCard = document.querySelector(".status-card");
        const stateValue = document.getElementById("stateValue");
        const earValue = document.getElementById("earValue");
        const knownValue = document.getElementById("knownValue");
        const liveValue = document.getElementById("liveValue");
        const logList = document.getElementById("logList");
        const manualBtn = document.getElementById("manualBtn");
        const manualName = document.getElementById("manualName");
        const manualResult = document.getElementById("manualResult");
        const adminControls = document.getElementById("adminControls");
        const adminToggle = document.getElementById("adminToggle");
        const adminPanel = document.getElementById("adminPanel");
        const lastUpdated = document.getElementById("lastUpdated");
        let adminVisible = false;

        function tickClock() {
            const now = new Date();
            document.getElementById("clock").textContent = now.toLocaleTimeString("en-US", {
                hour: "2-digit",
                minute: "2-digit",
                second: "2-digit",
                hour12: true
            });
            document.getElementById("date").textContent = now.toLocaleDateString("en-US", {
                weekday: "short",
                month: "short",
                day: "numeric"
            });
        }

        function statusMessageFromState(state, message, name, action) {
            if (message) return message;
            if (state === "WAITING_FOR_BLINK") return "Blink to verify";
            if (state === "FACE_DETECTED") return "Face detected";
            if (state === "MATCHED") return name ? `Welcome, ${name}!` : "Face matched";
            if (state === "CLOCKED_IN") {
                if (!name) return "Attendance recorded";
                const actionLabel = action === "clock_out" ? "Clocked out" : "Clocked in";
                return `${actionLabel}: ${name}`;
            }
            return "Step toward camera";
        }

        function applyStatusState(state) {
            const normalizedState = state || "IDLE";
            let borderColor = "#b8860b";
            let textColor = "";

            if (normalizedState === "CLOCKED_IN" || normalizedState === "ALREADY_CLOCKED") {
                borderColor = "#2fa36b";
                textColor = "#2fa36b";
            } else if (normalizedState === "NOT_RECOGNIZED") {
                borderColor = "#bf4934";
                textColor = "#bf4934";
            }

            statusCard.style.borderLeftColor = borderColor;
            statusText.style.color = textColor;
        }

        function setAdminVisible(visible) {
            adminVisible = visible;
            adminControls.classList.toggle("active", adminVisible);
            adminPanel.classList.toggle("active", adminVisible);
        }

        async function fetchStatus() {
            try {
                const response = await fetch("/status", { cache: "no-store" });
                const data = await response.json();
                const msg = statusMessageFromState(
                    data.state,
                    data.message,
                    data.worker_name,
                    data.action
                );
                statusText.textContent = msg;
                applyStatusState(data.state);
                stateValue.textContent = `State: ${data.state || "IDLE"}`;
                earValue.textContent = `EAR: ${Number(data.ear || 0).toFixed(2)}`;
                knownValue.textContent = `Workers: ${data.known_workers || 0}`;
                liveValue.textContent = `Liveness: ${data.liveness_confirmed ? "Yes" : "No"}`;
                lastUpdated.textContent = `Last update: ${new Date().toLocaleTimeString()}`;

                if (adminVisible) {
                    renderAdmin(data.admin || { workers: [], worker_count: 0, total_photos: 0 });
                }
            } catch (error) {
                statusText.textContent = "Status unavailable";
                applyStatusState("NOT_RECOGNIZED");
            }
        }

        function renderAdmin(admin) {
            const workers = admin.workers || [];
            const rows = workers.slice(0, 30).map((worker) => {
                return `
                    <div class="worker-row">
                        <span>${worker.name}</span>
                        <span>${worker.photo_count} photos</span>
                        <span>#${worker.id}</span>
                    </div>
                `;
            }).join("");
            adminPanel.innerHTML = `
                <div style="margin-bottom:8px;color:#f0d18b;">
                    Workers: ${admin.worker_count || 0} | Photos: ${admin.total_photos || 0}
                </div>
                ${rows || "<div>No workers enrolled.</div>"}
            `;
        }

        async function fetchLog() {
            try {
                const response = await fetch("/log", { cache: "no-store" });
                const logs = await response.json();
                const rows = logs.slice(0, 6).map((item) => {
                    const ts = new Date(item.timestamp);
                    const time = isNaN(ts.getTime()) ? item.timestamp : ts.toLocaleTimeString("en-US", {
                        hour: "2-digit",
                        minute: "2-digit"
                    });
                    return `
                        <div class="log-item">
                            <span class="pill ${item.action}">${item.action.replace("_", " ")}</span>
                            <span>${item.worker_name}</span>
                            <span>${time}</span>
                        </div>
                    `;
                }).join("");
                logList.innerHTML = rows || `<div class="log-item"><span>No activity today.</span></div>`;
            } catch (error) {
                logList.innerHTML = `<div class="log-item"><span>Unable to load logs.</span></div>`;
            }
        }

        async function submitManualClock() {
            const name = manualName.value.trim();
            if (!name) {
                manualResult.textContent = "Enter a worker name.";
                manualResult.style.color = "#ff9e8f";
                return;
            }
            manualResult.textContent = "Submitting...";
            manualResult.style.color = "#9ea1a8";
            try {
                const response = await fetch("/manual-clock", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ name })
                });
                const data = await response.json();
                if (!response.ok || !data.success) {
                    manualResult.textContent = data.error || "Manual clock failed.";
                    manualResult.style.color = "#ff9e8f";
                    return;
                }
                manualResult.textContent = `${data.worker_name}: ${data.action.replace("_", " ")}`;
                manualResult.style.color = "#87dfb3";
                manualName.value = "";
                fetchLog();
            } catch (error) {
                manualResult.textContent = "Connection error.";
                manualResult.style.color = "#ff9e8f";
            }
        }

        adminToggle.addEventListener("click", () => {
            setAdminVisible(!adminVisible);
        });

        document.addEventListener("keydown", (event) => {
            if (event.key.toLowerCase() === "a") {
                setAdminVisible(!adminVisible);
            }
            if (event.key === "Enter" && document.activeElement === manualName) {
                submitManualClock();
            }
        });

        manualBtn.addEventListener("click", submitManualClock);

        tickClock();
        setInterval(tickClock, 1000);
        fetchStatus();
        fetchLog();
        setInterval(fetchStatus, 500);
        setInterval(fetchLog, 4000);
    </script>
</body>
</html>
